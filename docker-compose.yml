services:
  postgres:
    image: postgres:15-alpine
    container_name: rate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RATE_DB_NAME:-rate_db}
      POSTGRES_USER: ${RATE_DB_USERNAME:-rate_user}
      POSTGRES_PASSWORD: ${RATE_DB_PASSWORD:?Set RATE_DB_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RATE_DB_USERNAME:-rate_user} -d ${RATE_DB_NAME:-rate_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rate-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${RATE_DB_NAME:-rate_db}
      DB_USERNAME: ${RATE_DB_USERNAME:-rate_user}
      DB_PASSWORD: ${RATE_DB_PASSWORD:?Set RATE_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3033}
      COMPANY_EMAIL_DOMAIN: ${COMPANY_EMAIL_DOMAIN:-gtp.or.kr}
      ALLOW_SELF_REGISTRATION: ${ALLOW_SELF_REGISTRATION:-false}
      DB_SYNCHRONIZE: "false"
      PORT: 3000
    ports:
      - "3030:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rate-frontend
    restart: unless-stopped
    ports:
      - "3033:80"
    depends_on:
      - backend

volumes:
  postgres_data:
