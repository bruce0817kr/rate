version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rate-postgres
    environment:
      POSTGRES_DB: rate_db
      POSTGRES_USER: rate_user
      POSTGRES_PASSWORD: rate_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rate_user -d rate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rate-backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: rate_db
      DATABASE_USER: rate_user
      DATABASE_PASSWORD: rate_password
      JWT_SECRET: rate-jwt-secret-key-2024
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rate-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
